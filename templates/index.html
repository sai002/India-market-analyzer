<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Market Report: {{ sector }}</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; line-height: 1.8; color: #2c3e50; background-color: #f4f7f6; margin: 0; padding: 40px 20px; }
        .container { max-width: 850px; margin: 0 auto; background: white; padding: 60px; border-radius: 8px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        .header-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        h1 { font-family: 'Playfair Display', serif; font-size: 2.5rem; color: #1a202c; margin: 0; }
        
        /* The Download Button Style */
        .btn-download {
            background-color: #3498db;
            color: white;
            padding: 10px 20px;
            border-radius: 5px;
            text-decoration: none;
            font-weight: 600;
            font-size: 0.9rem;
            transition: background 0.3s;
        }
        .btn-download:hover { background-color: #2980b9; }
        
        .badge { background: #ebf8ff; color: #2b6cb0; padding: 4px 12px; border-radius: 20px; font-size: 0.8rem; font-weight: bold; text-transform: uppercase; }
        .footer { margin-top: 50px; font-size: 0.9rem; color: #a0aec0; text-align: center; border-top: 1px solid #edf2f7; padding-top: 20px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header-row">
            <span class="badge">AI-Generated Insights</span>
            <a href="?download=true" class="btn-download">📥 Download .md File</a>
        </div>
        
        <h1>{{ sector }} Market Analysis</h1>
        
        <div>
            {{ report_html | safe }}
        </div>
        
        <div class="footer">
            Developed by Saikiran Bandi • Powered by Gemini 2.5 Flash
        </div>
    </div>
</body>
</html>
