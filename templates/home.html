<!DOCTYPE html>
<html>
<head>
    <title>India Market AI</title>
    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; background: #f0f2f5; }
        .card { background: white; padding: 2rem; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); text-align: center; }
        input { padding: 10px; width: 250px; border: 1px solid #ddd; border-radius: 5px; }
        button { padding: 10px 20px; background: #007bff; color: white; border: none; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="card">
        <h1>🇮🇳 Market Analyzer</h1>
        <input type="text" id="sector" placeholder="Enter sector (e.g. Solar)">
        <button onclick="window.location.href='/analyze/'+document.getElementById('sector').value">Analyze</button>
    </div>
</body>
</html>
